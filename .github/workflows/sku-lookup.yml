name: SKU Lookup

on:
  schedule:
    # Runs every hour at :17 (offset from top-of-hour to avoid scheduler congestion)
    - cron: '17 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub website

concurrency:
  group: sku-lookup
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lookup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for lock file
        id: lock_check
        run: |
          if [ -f running.lock ]; then
            echo "Lock file found — local run in progress. Skipping."
            echo "locked=true" >> "$GITHUB_OUTPUT"
          else
            echo "No lock file. Proceeding with batch."
            echo "locked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.lock_check.outputs.locked == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.lock_check.outputs.locked == 'false'
        run: pip install requests beautifulsoup4 pandas openpyxl

      - name: Configure git
        if: steps.lock_check.outputs.locked == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run SKU Scanner (until rate limited)
        if: steps.lock_check.outputs.locked == 'false'
        timeout-minutes: 300
        run: python sku_scanner.py --git-push-every 10 --exit-on-rate-limit

      - name: Final checkpoint push
        if: steps.lock_check.outputs.locked == 'false'
        run: |
          git add checkpoint.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto: final checkpoint update"
          # Retry push with rebase if remote has new commits (e.g. concurrent dashboard push)
          for i in 1 2 3; do
            git push && exit 0
            echo "Push rejected, pulling with rebase (attempt $i)..."
            git pull --rebase --autostash origin master
          done
          git push
