name: SKU Lookup

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub website

concurrency:
  group: sku-lookup
  cancel-in-progress: false

jobs:
  lookup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for lock file
        id: lock_check
        run: |
          if [ -f running.lock ]; then
            echo "Lock file found — local run in progress. Skipping."
            echo "locked=true" >> "$GITHUB_OUTPUT"
          else
            echo "No lock file. Proceeding with batch."
            echo "locked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.lock_check.outputs.locked == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.lock_check.outputs.locked == 'false'
        run: pip install requests beautifulsoup4 pandas openpyxl

      - name: Run SKU Scanner (batch of 30)
        if: steps.lock_check.outputs.locked == 'false'
        run: python sku_scanner.py --batch 30

      - name: Commit checkpoint
        if: steps.lock_check.outputs.locked == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checkpoint.json
          git diff --cached --quiet || git commit -m "Auto: checkpoint update (GitHub Actions batch)"
          git push
